name: omnicore
description: "OmniCore — The ultimate offline-first, all-in-one software ecosystem. Let's Sketch theme."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # ---- State management ----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ---- Local database (offline-first) ----
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ---- Cloud backend & auth ----
  supabase_flutter: ^2.6.0
  google_sign_in: ^6.2.1

  # ---- P2P / OmniBeam ----
  flutter_webrtc: ^1.5.2
  flutter_blue_plus: ^1.32.7

  # ---- File system & media ----
  filesystem_picker: ^4.1.0
  photo_manager: ^3.2.3
  share_plus: 12.0.2
  mime: ^1.0.6

  # ---- On-device AI (Gallery tagging) ----
  tflite_flutter: ^0.12.1

  # ---- Networking & mail ----
  http: ^1.2.1
  enough_mail: ^2.1.6
  connectivity_plus: ^6.0.3

  # ---- Permissions & device info ----
  permission_handler: ^11.3.1
  battery_plus: ^6.0.1
  device_info_plus: ^10.1.0

  # ---- Utilities ----
  uuid: ^4.4.0
  intl: ^0.19.0
  collection: ^1.18.0
  equatable: ^2.0.5
  logging: ^1.2.0

  # ---- Animation & rendering helpers ----
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8
  get_thumbnail_video: ^0.7.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ---- App icon generator ----
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat.ttf
    - family: PatrickHand
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf

# ---- App icon (run: dart run flutter_launcher_icons) ----
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  adaptive_icon_foreground_inset: 22
  adaptive_icon_monochrome: "assets/images/app_logo.png"
  remove_alpha_ios: false
  windows:
    generate: true
    image_path: "assets/images/app_logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/app_logo.png"
